<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Autocontador — Dashboard de Pagos</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } }
    }
  </script>
  <style>
    :root {
      --tg-bg: var(--tg-theme-bg-color, #0f172a);
      --tg-text: var(--tg-theme-text-color, #f1f5f9);
      --tg-hint: var(--tg-theme-hint-color, #64748b);
      --tg-link: var(--tg-theme-link-color, #38bdf8);
      --tg-btn: var(--tg-theme-button-color, #0ea5e9);
      --tg-btn-text: var(--tg-theme-button-text-color, #ffffff);
      --tg-secondary: var(--tg-theme-secondary-bg-color, #1e293b);
    }
    body { background-color: var(--tg-bg); color: var(--tg-text); min-height: 100vh; }
    .glass { background: rgba(255,255,255,0.04); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.07); }
    .card-secondary { background-color: var(--tg-secondary); }
    .modal-overlay { background: rgba(0,0,0,0.8); backdrop-filter: blur(4px); }
  </style>
</head>
<body class="dark px-4 pt-6 pb-20 overflow-x-hidden">

  <!-- Header -->
  <header class="flex items-center justify-between mb-6">
    <div class="flex items-center gap-2">
      <span class="text-2xl">🤖</span>
      <h1 class="text-xl font-bold italic" style="color: var(--tg-link)">Autocontador</h1>
    </div>
    <div class="flex items-center gap-4">
      <div id="status-badge" class="flex items-center gap-1.5 px-2 py-1 rounded-full bg-emerald-500/10 border border-emerald-500/20">
        <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
        <span class="text-[10px] uppercase font-bold text-emerald-500">Online</span>
      </div>
      <button onclick="loadHistory(); loadStatus();" class="px-3 py-1.5 rounded-lg text-sm font-medium" style="background: var(--tg-btn); color: var(--tg-btn-text)">Actualizar</button>
    </div>
  </header>

  <!-- Server Stats (Mini) -->
  <div class="flex gap-4 mb-4 px-1">
    <div class="flex items-center gap-2">
      <span class="text-[10px] text-slate-500 uppercase font-bold tracking-tighter">Uptime:</span>
      <span id="uptime-val" class="text-[10px] font-mono text-sky-400">0h 0m 0s</span>
    </div>
    <div class="flex items-center gap-2">
      <span class="text-[10px] text-slate-500 uppercase font-bold tracking-tighter">RAM:</span>
      <span id="ram-val" class="text-[10px] font-mono text-emerald-400">0%</span>
    </div>
  </div>

  <!-- Stats -->
  <div class="grid grid-cols-2 gap-3 mb-6">
    <div class="card-secondary p-4 rounded-2xl">
      <p class="text-[10px] uppercase tracking-widest font-bold" style="color: var(--tg-hint)">Total Procesado</p>
      <p id="stat-total" class="text-2xl font-black text-white mt-1">S/ 0.00</p>
    </div>
    <div class="card-secondary p-4 rounded-2xl">
      <p class="text-[10px] uppercase tracking-widest font-bold" style="color: var(--tg-hint)">Registros</p>
      <p id="stat-count" class="text-2xl font-black text-white mt-1">0</p>
    </div>
  </div>

  <!-- Tabla -->
  <div class="glass rounded-3xl overflow-hidden mb-8">
    <div class="overflow-x-auto">
      <table class="w-full text-left border-collapse">
        <thead class="text-[10px] uppercase tracking-wider" style="background: rgba(255,255,255,0.02); color: var(--tg-hint)">
          <tr>
            <th class="px-5 py-4 font-bold">Emisor</th>
            <th class="px-5 py-4 font-bold">Pagador</th>
            <th class="px-5 py-4 font-bold text-right">Monto</th>
            <th class="px-5 py-4 text-center">Detalle</th>
          </tr>
        </thead>
        <tbody id="table-body" class="text-sm">
          <!-- Dinámico -->
        </tbody>
      </table>
    </div>
  </div>

  <!-- Modal Detalle -->
  <div id="modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 modal-overlay hidden">
    <div class="glass w-full max-w-sm rounded-[32px] overflow-hidden shadow-2xl scale-95 transition-transform duration-300">
      <div class="p-8">
        <div class="flex justify-between items-start mb-6">
          <h3 class="text-lg font-bold">Detalle del Pago</h3>
          <button onclick="closeModal()" class="text-2xl leading-none">&times;</button>
        </div>
        <div class="space-y-4" id="modal-content">
          <!-- Dinámico -->
        </div>
        <button onclick="closeModal()" class="w-full mt-8 py-3 rounded-2xl font-bold" style="background: var(--tg-btn); color: var(--tg-btn-text)">Cerrar Pantalla</button>
      </div>
    </div>
  </div>

  <script>
    const tg = window.Telegram?.WebApp;
    if (tg) { tg.ready(); tg.expand(); }

    let historyData = [];

    const maskName = (name) => {
      if (!name || name === 'null') return '—';
      const parts = name.split(' ');
      return parts.map(p => p[0] + '*'.repeat(Math.max(0, p.length - 1))).join(' ');
    };

    const fmtMonto = (v) => new Intl.NumberFormat('es-PE', { style: 'currency', currency: 'PEN' }).format(v);

    async function loadHistory() {
      try {
        const res = await fetch('/api/history');
        const data = await res.json();
        historyData = data.records;
        
        document.getElementById('stat-total').innerText = fmtMonto(data.total);
        document.getElementById('stat-count').innerText = data.count;
        
        const tbody = document.getElementById('table-body');
        tbody.innerHTML = '';
        
        historyData.forEach((r, i) => {
          const tr = document.createElement('tr');
          tr.className = "border-t border-white/5";
          tr.innerHTML = `
            <td class="px-5 py-4 font-bold">${r.emisor || '—'}</td>
            <td class="px-5 py-4 text-xs" style="color: var(--tg-hint)">${maskName(r.pagador)}</td>
            <td class="px-5 py-4 text-right font-black text-emerald-400">${fmtMonto(r.monto)}</td>
            <td class="px-5 py-4 text-center">
              <button onclick="showDetail(${i})" class="w-8 h-8 rounded-full bg-white/5 inline-flex items-center justify-center">👁️</button>
            </td>
          `;
          tbody.appendChild(tr);
        });
      } catch (e) { console.error(e); }
    }

    function showDetail(index) {
      const r = historyData[index];
      const content = document.getElementById('modal-content');
      content.innerHTML = `
        <div class="flex justify-between border-b border-white/5 pb-2">
          <span class="text-xs" style="color: var(--tg-hint)">Fecha</span>
          <span class="font-medium">${r.date || r.fecha || 'Sin fecha'}</span>
        </div>
        <div class="flex justify-between border-b border-white/5 pb-2">
          <span class="text-xs" style="color: var(--tg-hint)">Emisor</span>
          <span class="font-bold">${r.emisor}</span>
        </div>
        <div class="flex flex-col gap-1 border-b border-white/5 pb-2">
          <span class="text-xs" style="color: var(--tg-hint)">Nombre Completo</span>
          <span class="text-base font-bold text-sky-400">${r.pagador || 'Desconocido'}</span>
        </div>
        <div class="flex justify-between border-b border-white/5 pb-2">
          <span class="text-xs" style="color: var(--tg-hint)">ID Operación</span>
          <span class="font-mono text-[10px]">${r.numero_operacion || '—'}</span>
        </div>
        <div class="flex justify-between pt-2">
          <span class="text-xs" style="color: var(--tg-hint)">Monto</span>
          <span class="text-xl font-black text-emerald-500">${fmtMonto(r.monto)}</span>
        </div>
      `;
      const modal = document.getElementById('modal');
      modal.classList.remove('hidden');
      setTimeout(() => modal.firstElementChild.classList.remove('scale-95'), 10);
    }

    function closeModal() {
      const modal = document.getElementById('modal');
      modal.firstElementChild.classList.add('scale-95');
      setTimeout(() => modal.classList.add('hidden'), 200);
    }

    async function loadStatus() {
      try {
        const res = await fetch('/api/status');
        const data = await res.json();
        document.getElementById('uptime-val').innerText = data.uptime;
        document.getElementById('ram-val').innerText = data.memory.percent + '%';
      } catch (e) {
        document.getElementById('status-badge').innerHTML = `
          <span class="w-2 h-2 rounded-full bg-red-500"></span>
          <span class="text-[10px] uppercase font-bold text-red-500">Offline</span>
        `;
      }
    }

    loadHistory();
    loadStatus();
    setInterval(() => {
      loadHistory();
      loadStatus();
    }, 30000);
  </script>
</body>
</html>
